name: MLIR CI
on:
  push:
    branches: [main]
    paths: ["mlir/**"]
  pull_request:
    paths: ["mlir/**", ".github/workflows/ci_mlir.yml"]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  cpp-test-mlir:
    name: Test MLIR with LLVM@${{ matrix.llvm }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 19.1.7
          - { os: ubuntu-24.04, llvm: 19.1.7, targets: X86, family: linux }
          - {
              os: ubuntu-24.04-arm,
              llvm: 19.1.7,
              targets: AArch64,
              family: linux,
            }
          - { os: macos-14, llvm: 19.1.7, targets: AArch64, family: macos }
          - { os: windows2022, llvm: 19.1.7, targets: X86, family: windows }
          - {
              os: windows-11-arm,
              llvm: 19.1.7,
              targets: AArch64,
              family: windows,
            }
          # 20.1.8
          - { os: ubuntu-24.04, llvm: 20.1.8, targets: X86, family: linux }
          - {
              os: ubuntu-24.04-arm,
              llvm: 20.1.8,
              targets: AArch64,
              family: linux,
            }
          - { os: macos-14, llvm: 20.1.8, targets: AArch64, family: macos }
          - { os: windows2022, llvm: 20.1.8, targets: X86, family: windows }
          - {
              os: windows-11-arm,
              llvm: 20.1.8,
              targets: AArch64,
              family: windows,
            }
          # Specific commit
          - {
              os: ubuntu-24.04,
              llvm: 179d30f8c3fddd3c85056fd2b8e877a4a8513158,
              targets: X86,
              family: linux,
            }
          - {
              os: ubuntu-24.04-arm,
              llvm: 179d30f8c3fddd3c85056fd2b8e877a4a8513158,
              targets: AArch64,
              family: linux,
            }
          - {
              os: macos-14,
              llvm: 179d30f8c3fddd3c85056fd2b8e877a4a8513158,
              targets: AArch64,
              family: macos,
            }
          - {
              os: windows2022,
              llvm: 179d30f8c3fddd3c85056fd2b8e877a4a8513158,
              targets: X86,
              family: windows,
            }
          - {
              os: windows-11-arm,
              llvm: 179d30f8c3fddd3c85056fd2b8e877a4a8513158,
              targets: AArch64,
              family: windows,
            }
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup LLVM+MLIR (optimized)
        id: toolchain
        uses: ./.github/actions/build-llvm-mlir-opt
        with:
          version: ${{ matrix.llvm }}
          targets: ${{ matrix.targets }}
          publish: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Install uv (Python)
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.13
          activate-environment: true

      - name: Install Ninja (non-Windows)
        if: matrix.family != 'windows'
        run: uv tool install ninja

      - name: Install lit (all)
        run: uv pip install lit

      - name: Setup ccache (Linux only)
        if: matrix.family == 'linux'
        uses: Chocobo1/setup-ccache-action@v1
        with:
          prepend_symlinks_to_path: false
          override_cache_key: c++-tests-mlir-${{ matrix.os }}-llvm-${{ matrix.llvm }}

      - name: Set up mold as linker (Linux only)
        if: matrix.family == 'linux'
        uses: rui314/setup-mold@v1

      - name: Configure CMake (Linux/macOS)
        if: matrix.family != 'windows'
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_MQT_CORE_MLIR=ON \
            -DLLVM_DIR=$LLVM_DIR \
            -DMLIR_DIR=$MLIR_DIR \
            -DLLVM_EXTERNAL_LIT=$(which lit)

      - name: Configure CMake (Windows)
        if: matrix.family == 'windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_MQT_CORE_MLIR=ON `
            -DLLVM_DIR=$env:LLVM_DIR `
            -DMLIR_DIR=$env:MLIR_DIR `
            -DLLVM_EXTERNAL_LIT=${{ github.workspace }}\.venv\Scripts\lit.exe

      - name: Build MLIR components and run lit tests
        run: cmake --build build --config Release --target check-quantum-opt

      - name: Build MLIR unittests
        run: cmake --build build --config Release --target mqt-core-mlir-translation-test

      - name: Run unit tests
        run: ctest -C Release --output-on-failure --test-dir build/mlir --repeat until-pass:3 --timeout 600

  cpp-test-mlir-coverage:
    name: "📊 MLIR Coverage with LLVM@${{ matrix.llvm }}"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        llvm: [19.1.7, 20.1.8]
      fail-fast: false
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
      FORCE_COLOR: 3
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup LLVM+MLIR (optimized)
        id: toolchain_cov
        uses: ./.github/actions/build-llvm-mlir-opt
        with:
          version: ${{ matrix.llvm }}
          targets: X86
          publish: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.13
          activate-environment: true

      - name: Install Ninja
        run: uv tool install ninja

      - name: Install gcovr
        run: uv tool install gcovr

      - name: Install lit
        run: uv pip install lit

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          prepend_symlinks_to_path: false
          override_cache_key: c++-coverage-mlir-${{ matrix.llvm }}

      - name: Set up mold as linker
        uses: rui314/setup-mold@v1

      - name: Configure CMake for MLIR Coverage
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_MQT_CORE_MLIR=ON \
            -DLLVM_DIR=$LLVM_DIR \
            -DMLIR_DIR=$MLIR_DIR \
            -DLLVM_EXTERNAL_LIT=$(which lit) \
            -DENABLE_COVERAGE=ON \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

      - name: Build MLIR components and run tests with coverage
        run: cmake --build build --config Debug --target check-quantum-opt

      - name: Build MLIR unittests
        run: cmake --build build --config Debug --target mqt-core-mlir-translation-test

      - name: Run unit tests
        run: ctest -C Debug --output-on-failure --test-dir build/mlir --repeat until-pass:3 --timeout 600

      - name: Generate coverage data as JSON
        run: |
          gcovr \
             --gcov-executable "llvm-cov gcov" \
             --exclude build \
             --exclude-unreachable-branches \
             --exclude-noncode-lines \
             --exclude-throw-branches \
             --print-summary \
             --keep \
             --json \
             -o coverage-llvm-${{ matrix.llvm }}.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: mlir
          name: mlir-coverage-llvm-${{ matrix.llvm }}
          fail_ci_if_error: true
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
          files: coverage-llvm-${{ matrix.llvm }}.json
